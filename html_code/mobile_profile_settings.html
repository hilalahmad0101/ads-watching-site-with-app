<body class="bg-background text-on-background font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0b1326]/60 backdrop-blur-xl flex items-center px-4 h-16 w-full">
<div class="flex items-center gap-4 w-full">
<button class="p-2 hover:bg-[#222a3d] transition-colors rounded-full active:scale-95 duration-200 text-[#62df7d]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] tracking-tight font-semibold text-lg text-[#dae2fd]">John Doe</h1>
</div>
</header>
<main class="pt-20 px-4 space-y-8 max-w-md mx-auto">
<!-- Profile Header Section -->
<section class="flex flex-col items-center justify-center space-y-4 py-6">
<div class="relative">
<div class="w-32 h-32 rounded-full p-1 bg-gradient-to-tr from-primary to-primary-container">

</div>
<div class="absolute bottom-1 right-1 bg-primary text-on-primary p-1.5 rounded-full border-2 border-background shadow-lg">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div class="text-center">
<h2 class="text-2xl font-bold tracking-tight text-on-surface">John Doe</h2>
<div class="flex items-center justify-center gap-2 mt-1">
<span class="text-xs font-bold uppercase tracking-widest text-primary bg-primary-container/20 px-3 py-1 rounded-full">Platinum Member</span>
</div>
</div>
</section>
<!-- Custom Tab Bar -->
<nav class="flex p-1 bg-surface-container-low rounded-xl">
<button class="flex-1 py-3 text-sm font-semibold rounded-lg bg-gradient-to-r from-primary to-primary-container text-on-primary shadow-lg">
                Profile
            </button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-on-surface-variant hover:text-on-surface transition-colors">
                Security
            </button>
<button class="flex-1 py-3 text-sm font-semibold rounded-lg text-on-surface-variant hover:text-on-surface transition-colors">
                Payouts
            </button>
</nav>
<!-- Form Section -->
<section class="space-y-6">
<div class="space-y-5">
<!-- Input Group -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="w-full pl-12 pr-4 py-4 recessed-input border-none rounded-xl focus:ring-1 focus:ring-primary/40 text-on-surface font-medium placeholder-on-surface-variant/30" type="text" value="John Doe"/>
</div>
</div>
<!-- Input Group -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 recessed-input border-none rounded-xl focus:ring-1 focus:ring-primary/40 text-on-surface font-medium placeholder-on-surface-variant/30" type="email" value="john.doe@adreward.pro"/>
</div>
</div>
<!-- Input Group -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">phone</span>
</div>
<input class="w-full pl-12 pr-4 py-4 recessed-input border-none rounded-xl focus:ring-1 focus:ring-primary/40 text-on-surface font-medium placeholder-on-surface-variant/30" type="tel" value="+1 (555) 000-1234"/>
</div>
</div>
</div>
<!-- Profile Meta Card (Bento Style) -->
<div class="grid grid-cols-2 gap-4 pt-4">
<div class="bg-surface-container p-4 rounded-2xl flex flex-col gap-2">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Account ID</span>
<span class="text-sm font-mono text-primary">#ARP-99281</span>
</div>
<div class="bg-surface-container p-4 rounded-2xl flex flex-col gap-2">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Joined Date</span>
<span class="text-sm font-medium text-on-surface">Oct 2023</span>
</div>
</div>
<!-- Action Button -->
<div class="pt-6 pb-12">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-[0_8px_30px_rgb(28,166,77,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Save Changes
                </button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#0b1326] border-t border-[#3e4a3d]/15 shadow-[0_-4px_40px_rgba(6,14,32,0.08)] flex justify-around items-center h-20 px-2 pb-safe">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-[#bdcaba] opacity-60 hover:text-[#62df7d] transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-wider font-medium mt-1">Home</span>
</a>
<!-- Tasks -->

<span class="font-['Inter'] text-[10px] uppercase tracking-wider font-medium mt-1">Tasks</span>
</a>
<!-- Ads -->
<a class="flex flex-col items-center justify-center text-[#bdcaba] opacity-60 hover:text-[#62df7d] transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined">ads_click</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-wider font-medium mt-1">Ads</span>
</a>

<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-wider font-medium mt-1">Wallet</span>
</a>

<a class="flex flex-col items-center justify-center text-[#62df7d] bg-[#171f33] rounded-xl px-3 py-1 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-wider font-medium mt-1">Profile</span>
</a>
</nav>
