      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {

<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0b1326]/60 backdrop-blur-xl shadow-[0px_4px_40px_rgba(6,14,32,0.08)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-[#62df7d] active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-lg text-[#62df7d]">Wallet &amp; Withdraw</h1>
</div>
<div class="text-xl font-bold tracking-tighter text-[#62df7d]">The Emerald Ledger</div>
</div>
</header>
<main class="pt-24 px-6 max-w-md mx-auto space-y-8">
<!-- Balance Display Section -->
<section class="relative overflow-hidden rounded-xl bg-surface-container p-6 shadow-2xl">
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<div class="flex justify-between items-start mb-4">
<span class="text-on-surface-variant font-medium text-xs uppercase tracking-widest">Available Balance</span>
<div class="flex items-center gap-1.5 px-2 py-0.5 bg-primary/10 rounded-full border border-primary/20">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
<span class="text-[10px] text-primary font-bold uppercase tracking-tighter">Live Vault</span>
</div>
</div>
<div class="flex items-baseline gap-2">
<span class="text-on-surface-variant text-2xl font-light">$</span>
<span class="text-5xl font-extrabold tracking-tighter text-glow text-primary">1,284.50</span>
</div>
<div class="mt-6 flex gap-4">
<div class="flex-1 p-3 rounded-lg bg-surface-container-lowest">
<p class="text-[10px] text-on-surface-variant uppercase mb-1">Total Earned</p>
<p class="text-sm font-bold text-on-surface">$4,120.00</p>
</div>
<div class="flex-1 p-3 rounded-lg bg-surface-container-lowest">
<p class="text-[10px] text-on-surface-variant uppercase mb-1">Pending</p>
<p class="text-sm font-bold text-on-surface">$145.20</p>
</div>
</div>
</div>
</section>
<!-- Amount Input Section -->
<section class="space-y-4">
<h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant px-1">Withdraw Amount</h2>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="text-primary text-xl font-semibold">$</span>
</div>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-5 pl-12 pr-6 text-2xl font-bold text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/40 transition-all shadow-inner" placeholder="0.00" type="number"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 px-3 py-1 bg-surface-container-high rounded-md text-[10px] font-bold text-primary uppercase active:scale-95 transition-transform">Max</button>
</div>
<!-- Fee Display -->
<div class="flex justify-between items-center px-2">
<span class="text-xs text-on-surface-variant">Network Fee (2.5%)</span>
<span class="text-xs font-medium text-on-surface">$0.00</span>
</div>
</section>
<!-- Payment Methods Section -->
<section class="space-y-4">
<div class="flex justify-between items-center px-1">
<h2 class="text-sm font-bold uppercase tracking-widest text-on-surface-variant">Select Method</h2>
<span class="text-[10px] text-primary font-semibold underline">Manage</span>
</div>
<div class="grid grid-cols-1 gap-3">
<!-- Method 1 -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container border border-transparent peer-checked:border-primary/30 peer-checked:bg-primary/5 transition-all">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-lowest shadow-lg">
<span class="material-symbols-outlined text-primary" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">JazzCash</p>
<p class="text-xs text-on-surface-variant">0345 •••• 123</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary group-hover:border-primary/50 transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Method 2 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container border border-transparent peer-checked:border-primary/30 peer-checked:bg-primary/5 transition-all">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-lowest shadow-lg">
<span class="material-symbols-outlined text-primary" data-icon="payments">payments</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">EasyPaisa</p>
<p class="text-xs text-on-surface-variant">0300 •••• 987</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Method 3 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="payment_method" type="radio"/>
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container border border-transparent peer-checked:border-primary/30 peer-checked:bg-primary/5 transition-all">
<div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container-lowest shadow-lg">
<span class="material-symbols-outlined text-primary" data-icon="currency_bitcoin">currency_bitcoin</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface">Crypto Wallet</p>
<p class="text-xs text-on-surface-variant">TRX / USDT (BEP20)</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
</div>
</section>
<!-- Final Button -->
<button class="w-full py-5 rounded-xl bg-gradient-to-tr from-[#62df7d] to-[#1ca64d] text-[#003914] font-extrabold text-lg uppercase tracking-widest shadow-[0_10px_30px_rgba(98,223,125,0.2)] active:scale-95 transition-all mt-4">
            Withdraw Funds

<p class="text-center text-[10px] text-on-surface-variant uppercase tracking-widest leading-relaxed">

<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Home</span>

<button class="flex flex-col items-center justify-center text-[#bdcaba] opacity-70 hover:text-[#62df7d] transition-all active:scale-90 duration-200">

<span class="material-symbols-outlined" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Wallet</span>
</button>
<button class="flex flex-col items-center justify-center text-[#bdcaba] opacity-70 hover:text-[#62df7d] transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
