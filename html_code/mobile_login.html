<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md space-y-8">
<!-- Brand Header Section -->
<header class="flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 bg-surface-container-high rounded-xl flex items-center justify-center shadow-2xl shadow-primary/10 border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="space-y-1">
<h1 class="text-primary font-black text-2xl tracking-tighter uppercase">AdReward Pro</h1>
<h2 class="text-on-surface font-headline text-3xl font-extrabold tracking-tight">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-medium">Continue your journey to digital wealth</p>
</div>
</header>
<!-- Login Form -->
<main class="w-full bg-surface-container-low rounded-xl p-8 shadow-2xl space-y-6">
<form class="space-y-5">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-label uppercase tracking-widest text-[10px] font-bold text-on-surface-variant px-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">mail</span>
</div>
<input class="recessed-input block w-full pl-11 pr-4 py-4 rounded-lg border-none text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/40 transition-all text-base" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-label uppercase tracking-widest text-[10px] font-bold text-on-surface-variant">Password</label>
<a class="text-primary text-[10px] font-bold uppercase tracking-widest hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="recessed-input block w-full pl-11 pr-12 py-4 rounded-lg border-none text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/40 transition-all text-base" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center" type="button">
<span class="material-symbols-outlined text-outline hover:text-on-surface transition-colors">visibility</span>
</button>
</div>
</div>
<!-- Sign In CTA -->
<button class="primary-gradient w-full py-4 px-6 rounded-lg text-on-primary font-bold text-base shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 text-on-surface-variant text-[10px] uppercase tracking-widest font-bold">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-surface-container-high border border-outline-variant/5 hover:bg-surface-container-highest flex items-center justify-center py-3.5 rounded-lg transition-colors active:scale-95">
<img alt="" class="w-5 h-5 mr-2" data-alt="the official google logo icon with multi-colored design on a transparent background for social login button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDREDXjicOdeYiHG6J2iyiBSV8gEuZyO4O4CgjXEIxbl6_ZYhyUvl7l1-v-V9t2OQ2MK0wTkgn4B7HuJic4kocU0Ek1ny7Bt7ztY4UDOa5lmNn38pw2buUl5e6G7G_cWdVkJKhYXeli4uxOW3h-gbHCPAh-LKm5mcvx4xPgUr3E25lq0OMeUEs0WAvfg8AkyYULH-mPzxDXoRLC6QlHaNmKDPGi5UcGejUavzK6-KxD3R89po-ymgQllxBQCRIP0Rpk5Q04hr9HgA"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="bg-surface-container-high border border-outline-variant/5 hover:bg-surface-container-highest flex items-center justify-center py-3.5 rounded-lg transition-colors active:scale-95">
<span class="material-symbols-outlined text-xl mr-2" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
</main>
<!-- Footer Actions -->
<footer class="text-center space-y-4">
<p class="text-on-surface-variant text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Create Account</a>
</p>
<div class="pt-4 flex justify-center space-x-6">
<a class="text-[10px] uppercase tracking-widest font-bold text-outline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-widest font-bold text-outline hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</footer>
</div>
<!-- Visual Background Element -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
